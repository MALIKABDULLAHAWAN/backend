<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E0F6FF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grassGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#90EE90;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7ED321;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Sky background -->
  <rect width="600" height="250" fill="url(#skyGradient)"/>
  
  <!-- Ground -->
  <rect y="250" width="600" height="150" fill="url(#grassGradient)"/>
  
  <!-- Sun -->
  <circle cx="500" cy="80" r="30" fill="#FFD700"/>
  <path d="M500 30 L500 50 M500 110 L500 130 M450 80 L470 80 M530 80 L550 80 M465 55 L475 65 M525 95 L535 105 M465 105 L475 95 M525 65 L535 55" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Clouds -->
  <ellipse cx="150" cy="60" rx="25" ry="15" fill="white" opacity="0.8"/>
  <ellipse cx="170" cy="60" rx="30" ry="18" fill="white" opacity="0.8"/>
  <ellipse cx="190" cy="60" rx="20" ry="12" fill="white" opacity="0.8"/>
  
  <ellipse cx="350" cy="90" rx="20" ry="12" fill="white" opacity="0.8"/>
  <ellipse cx="365" cy="90" rx="25" ry="15" fill="white" opacity="0.8"/>
  <ellipse cx="380" cy="90" rx="18" ry="10" fill="white" opacity="0.8"/>
  
  <!-- Tree -->
  <rect x="80" y="180" width="20" height="70" fill="#8B4513"/>
  <circle cx="90" cy="170" r="35" fill="#228B22"/>
  <circle cx="75" cy="155" r="25" fill="#32CD32"/>
  <circle cx="105" cy="155" r="25" fill="#32CD32"/>
  
  <!-- Child figure pointing -->
  <g transform="translate(200, 200)">
    <!-- Body -->
    <ellipse cx="0" cy="20" rx="15" ry="25" fill="#4A90E2"/>
    <!-- Head -->
    <circle cx="0" cy="-10" r="12" fill="#FDBCB4"/>
    <!-- Hair -->
    <path d="M-10 -18 Q0 -25 10 -18 Q8 -22 0 -22 Q-8 -22 -10 -18" fill="#8B4513"/>
    <!-- Eyes -->
    <circle cx="-4" cy="-12" r="1.5" fill="#000"/>
    <circle cx="4" cy="-12" r="1.5" fill="#000"/>
    <!-- Smile -->
    <path d="M-4 -6 Q0 -3 4 -6" stroke="#000" stroke-width="1" fill="none"/>
    <!-- Arms -->
    <line x1="-12" y1="10" x2="-25" y2="5" stroke="#FDBCB4" stroke-width="4" stroke-linecap="round"/>
    <line x1="12" y1="10" x2="40" y2="-10" stroke="#FDBCB4" stroke-width="4" stroke-linecap="round"/>
    <!-- Pointing finger -->
    <circle cx="42" cy="-12" r="2" fill="#FDBCB4"/>
    <!-- Legs -->
    <line x1="-8" y1="40" x2="-8" y2="60" stroke="#4A90E2" stroke-width="6" stroke-linecap="round"/>
    <line x1="8" y1="40" x2="8" y2="60" stroke="#4A90E2" stroke-width="6" stroke-linecap="round"/>
    <!-- Shoes -->
    <ellipse cx="-8" cy="62" rx="6" ry="3" fill="#000"/>
    <ellipse cx="8" cy="62" rx="6" ry="3" fill="#000"/>
  </g>
  
  <!-- Target object (butterfly) -->
  <g transform="translate(400, 150)">
    <!-- Butterfly body -->
    <ellipse cx="0" cy="0" rx="2" ry="15" fill="#8B4513"/>
    <!-- Wings -->
    <ellipse cx="-8" cy="-5" rx="12" ry="8" fill="#FF69B4" opacity="0.8"/>
    <ellipse cx="8" cy="-5" rx="12" ry="8" fill="#FF69B4" opacity="0.8"/>
    <ellipse cx="-8" cy="5" rx="10" ry="6" fill="#FFB6C1" opacity="0.8"/>
    <ellipse cx="8" cy="5" rx="10" ry="6" fill="#FFB6C1" opacity="0.8"/>
    <!-- Wing patterns -->
    <circle cx="-8" cy="-5" r="3" fill="#FF1493" opacity="0.6"/>
    <circle cx="8" cy="-5" r="3" fill="#FF1493" opacity="0.6"/>
    <!-- Antennae -->
    <line x1="-2" y1="-12" x2="-4" y2="-18" stroke="#000" stroke-width="1"/>
    <line x1="2" y1="-12" x2="4" y2="-18" stroke="#000" stroke-width="1"/>
    <circle cx="-4" cy="-18" r="1" fill="#000"/>
    <circle cx="4" cy="-18" r="1" fill="#000"/>
  </g>
  
  <!-- Pointing arrow (dashed line) -->
  <line x1="240" y1="190" x2="380" y2="160" stroke="#4A90E2" stroke-width="3" stroke-dasharray="8,4" opacity="0.7"/>
  <path d="M375 155 L385 160 L375 165 Z" fill="#4A90E2" opacity="0.7"/>
  
  <!-- Flowers -->
  <g transform="translate(120, 280)">
    <circle cx="0" cy="0" r="8" fill="#FF69B4"/>
    <circle cx="-6" cy="-6" r="6" fill="#FFB6C1"/>
    <circle cx="6" cy="-6" r="6" fill="#FFB6C1"/>
    <circle cx="-6" cy="6" r="6" fill="#FFB6C1"/>
    <circle cx="6" cy="6" r="6" fill="#FFB6C1"/>
    <circle cx="0" cy="0" r="3" fill="#FFD700"/>
    <line x1="0" y1="8" x2="0" y2="25" stroke="#228B22" stroke-width="2"/>
  </g>
  
  <g transform="translate(450, 290)">
    <circle cx="0" cy="0" r="6" fill="#9370DB"/>
    <circle cx="-4" cy="-4" r="4" fill="#DDA0DD"/>
    <circle cx="4" cy="-4" r="4" fill="#DDA0DD"/>
    <circle cx="-4" cy="4" r="4" fill="#DDA0DD"/>
    <circle cx="4" cy="4" r="4" fill="#DDA0DD"/>
    <circle cx="0" cy="0" r="2" fill="#FFD700"/>
    <line x1="0" y1="6" x2="0" y2="20" stroke="#228B22" stroke-width="2"/>
  </g>
  
  <!-- Title text -->
  <text x="300" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#4A90E2">
    Joint Attention Game
  </text>
  <text x="300" y="375" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#666">
    Look where I point and find the hidden objects!
  </text>
</svg>