<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90E2;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#7ED321;stop-opacity:0.1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="url(#bg)" rx="16"/>
  
  <!-- Border -->
  <rect width="400" height="300" fill="none" stroke="#4A90E2" stroke-width="2" rx="16"/>
  
  <!-- Game Icon -->
  <circle cx="200" cy="120" r="40" fill="#4A90E2" opacity="0.2"/>
  <path d="M180 100 L220 120 L180 140 Z" fill="#4A90E2"/>
  
  <!-- Title -->
  <text x="200" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#4A90E2">
    Therapeutic Game
  </text>
  
  <!-- Subtitle -->
  <text x="200" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#666">
    Loading game content...
  </text>
  
  <!-- Decorative elements -->
  <circle cx="80" cy="80" r="8" fill="#7ED321" opacity="0.3"/>
  <circle cx="320" cy="80" r="6" fill="#F5A623" opacity="0.3"/>
  <circle cx="80" cy="220" r="6" fill="#BD10E0" opacity="0.3"/>
  <circle cx="320" cy="220" r="8" fill="#7ED321" opacity="0.3"/>
</svg>